name: flutter_time_utils
description: >-
  A lightweight Flutter package providing Duration extensions (5.seconds, 2.hours),
  DateTime helpers (isToday, format, timeAgo), a zero-dependency date formatter,
  relative time strings, and compact duration formatting.
version: 1.1.2

repository: https://github.com/DevSalmanCodes/flutter_time_utils
issue_tracker: https://github.com/DevSalmanCodes/flutter_time_utils/issues
documentation: https://pub.dev/documentation/flutter_time_utils/latest/

topics:
  - date
  - time
  - datetime
  - duration
  - utilities

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
